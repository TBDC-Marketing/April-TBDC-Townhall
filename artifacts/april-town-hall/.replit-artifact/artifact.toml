kind = "slides"
previewPath = "/"
title = "April Town Hall"
version = "1.0.0"
id = "artifacts/april-town-hall"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23942

[services.development]
run = "pnpm --filter @workspace/april-town-hall run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/april-town-hall", "run", "build" ]
publicDir = "artifacts/april-town-hall/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23942"
BASE_PATH = "/"
